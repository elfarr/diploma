services:
  risk-api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    image: risk-api:latest
    env_file:
      - .env.prod.example
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
