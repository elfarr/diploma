svm_rbf:
  C: [0.03, 0.1, 0.3, 1, 3, 10, 30]
  gamma: ["scale", 0.3, 0.1, 0.03, 0.01, 0.003]
  class_weight: ["balanced", {0: 1, 1: 1}, {0: 1, 1: 2}, {0: 1, 1: 3}, {0: 1, 1: 5}, {0: 1, 1: 8}, {0: 1, 1: 12}, {0: 1, 1: 15}, {0: 1, 1: 20}, {0: 1, 1: 30}]

catboost:
  depth: [3, 4, 6, 8]
  n_estimators: [300, 500, 800]
  learning_rate: [0.03, 0.06]
  class_weights: ["balanced", [1, 1], [1, 2], [1, 3], [1, 5], [1, 8], [1, 12], [1, 15], [1, 20]]

xgboost:
  n_estimators: [200, 250, 300]
  max_depth: [2, 3]
  learning_rate: [0.03, 0.05]
  min_child_weight: [2, 4]
  subsample: [0.8, 0.9]
  colsample_bytree: [0.7, 0.8]
  reg_lambda: [5, 6, 8]
  gamma: [0.0, 0.5, 1.0]
  scale_pos_weight: [4.0, 4.5, 5.0]

mlp:
  layers: [[8], [16], [32], [16, 8], [32, 16]]
  dropout: [0.2, 0.3, 0.4]
  weight_decay: [1e-4, 1e-3, 1e-2]
  early_stopping: true

calibration:
  methods: ["none", "platt", "isotonic"]
